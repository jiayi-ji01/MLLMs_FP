experiment_name: english_to_fake_transfer_fake_control_qlora
seed: 42
training_mode: qlora

model:
  name_or_path: meta-llama/Llama-3.1-8B-Instruct
  torch_dtype: bfloat16
  trust_remote_code: false

quantization:
  enabled: true
  load_in_4bit: true
  bnb_4bit_quant_type: nf4
  bnb_4bit_use_double_quant: true
  bnb_4bit_compute_dtype: bfloat16

lora:
  r: 16
  alpha: 32
  dropout: 0.05
  target_modules: [q_proj, k_proj, v_proj, o_proj]
  bias: none
  task_type: CAUSAL_LM

data:
  processed_dir: data/processed/english_to_fake_transfer
  train_language_mode: en_plus_fake
  train_files_by_mode:
    en_only: data/processed/english_to_fake_transfer/sft/train_en_only_sft.jsonl
    en_plus_fake: data/processed/english_to_fake_transfer/sft/train_en_plus_fake_sft.jsonl

training:
  output_dir: outputs/checkpoints/llama31_8b_fake_control_qlora
  num_train_epochs: 6
  per_device_train_batch_size: 1
  gradient_accumulation_steps: 16
  learning_rate: 0.0002
  lr_scheduler_type: cosine
  warmup_ratio: 0.03
  logging_steps: 10
  save_strategy: epoch
  eval_strategy: "no"
  bf16: true
  gradient_checkpointing: true
  max_seq_length: 192
  weight_decay: 0.0
  max_grad_norm: 1.0
  optim: paged_adamw_8bit
